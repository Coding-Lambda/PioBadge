[env:adafruit_pybadge_m4]
platform = atmelsam
board = adafruit_pybadge_m4
framework = arduino
lib_deps = 
    Adafruit GFX Library=symlink://../Adafruit-GFX-Library ; Custom fork without DMA due to problems together with PIO
    adafruit/Adafruit SPIFlash@^5.1.1
    adafruit/Adafruit ImageReader Library@^2.10.0
    adafruit/Adafruit LIS3DH@^1.3.0
    adafruit/SdFat - Adafruit Fork@^2.3.103